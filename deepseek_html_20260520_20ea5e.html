    <style>
        /* Твои стили — меню, фон, водяной знак и т.д. */
        body { margin: 0; padding: 0; background: #0a0f1a; color: #fff; font-family: system-ui; display: flex; height: 100vh; overflow: hidden; }
        .menu { width: 90px; background: #11161f; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 10px; border-right: 1px solid #2a3440; }
        .menu a { color: #ccc; text-decoration: none; background: #1e2a36; width: 60px; text-align: center; padding: 12px 0; border-radius: 12px; font-weight: bold; }
        .menu a:hover { background: #2c4a6e; color: white; }
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .video-area { flex: 1; background: black; position: relative; display: flex; align-items: center; justify-content: center; }
        video, .mejs__container { width: 100% !important; height: 100% !important; background: black; }
        .info-bar { background: #1a1f2c; padding: 12px 20px; border-top: 1px solid #2a3440; text-align: center; font-family: monospace; font-size: 16px; letter-spacing: 1px; }
        .loader { position: absolute; top: 50%; left: 50%; width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; transform: translate(-50%, -50%); display: none; z-index: 20; }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        .watermark { position: absolute; z-index: 10; left: 20px; top: 20px; display: none; }

<body>



<div class="content">
    <div class="video-area">
        <video id="my-video" style="width:100%; height:100%;" preload="metadata" playsinline></video>
        <div class="loader" id="loader"></div>
        <div class="watermark">
            <a href="#" target="_blank"><img src="https://demo.playtubescript.com/themes/default/img/icon.png" alt='logo'></a>
        </div>
    </div>
    <div class="info-bar" id="streamInfo">✨ Загрузка плеера...</div>
</div>

<input type="hidden" class="main_session" value="demo_session_key">

<script>
    (function() {
        const video = document.getElementById('my-video');
        const loader = document.getElementById('loader');
        const infoDiv = document.getElementById('streamInfo');
        let player = null;
        let currentHls = null;
        let streamUrl = null;

        // Вспомогательные функции
        function formatTime(sec) {
            if (isNaN(sec)) return '00:00';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        // 1. ПОЛУЧАЕМ URL ИЗ АДРЕСНОЙ СТРОКИ (ГЛАВНЫЙ ИСТОЧНИК)
        function getStreamFromUrl() {
            const params = new URLSearchParams(window.location.search);
            // Поддерживаем все варианты: src / file / stream / url
            return params.get('src') || params.get('file') || params.get('stream') || params.get('url');
        }

        // 2. ФУНКЦИЯ ШИФРОВАНИЯ ССЫЛКИ (24 ЧАСА) — ВЕБ-КРИПТО-AES-GCM
        async function encryptUrl(plainUrl) {
            try {
                const enc = new TextEncoder();
                // Генерируем случайный ключ (AES-GCM, 256 бит)
                const keyMaterial = await crypto.subtle.generateKey(
                    { name: "AES-GCM", length: 256 },
                    true,
                    ["encrypt", "decrypt"]
                );
                // Экспортируем ключ в Base64, чтобы сохранить в hash
                const exportedKey = await crypto.subtle.exportKey("raw", keyMaterial);
                const keyBase64 = btoa(String.fromCharCode(...new Uint8Array(exportedKey)));

                // Генерируем случайный вектор (iv)
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const encrypted = await crypto.subtle.encrypt(
                    { name: "AES-GCM", iv: iv },
                    keyMaterial,
                    enc.encode(plainUrl)
                );
                const encryptedArray = new Uint8Array(encrypted);
                const combined = new Uint8Array(iv.length + encryptedArray.length);
                combined.set(iv);
                combined.set(encryptedArray, iv.length);
                const encryptedBase64 = btoa(String.fromCharCode(...combined));
                // Возвращаем зашифрованную строку + ключ
                return { enc: encryptedBase64, k: keyBase64 };
            } catch (err) {
                console.warn("Encryption error, fallback to plain url", err);
                return null;
            }
        }

        // 3. ЗАГРУЖАЕМ И ВОССТАНАВЛИВАЕМ ВИДЕО (MP4 / HLS)
        function loadMedia(url) {
            if (!url) {
                infoDiv.innerHTML = '❌ Ошибка: не указан параметр ?src= в URL';
                return;
            }
            streamUrl = url;
            loader.style.display = 'block';
            infoDiv.innerHTML = `⏳ Загрузка потока... (${url.substring(0, 70)}...)`;

            // Уничтожаем старый HLS и плеер
            if (currentHls) { currentHls.destroy(); currentHls = null; }
            if (player) { player.pause(); player.remove(); player = null; }

            // Обработка HLS (.m3u8)
            if (url.includes('.m3u8') || url.includes('m3u8?')) {
                if (window.Hls && Hls.isSupported()) {
                    currentHls = new Hls({ debug: false });
                    currentHls.loadSource(url);
                    currentHls.attachMedia(video);
                    currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
                        loader.style.display = 'none';
                        infoDiv.innerHTML = `▶ Играет: ${url.substring(0, 60)}...`;
                        video.play().catch(e => infoDiv.innerHTML = '🔇 Нажмите Play для запуска');
                        initPlayer();
                    });
                    currentHls.on(Hls.Events.ERROR, (ev, data) => {
                        if (data.fatal) {
                            console.error("HLS fatal error", data);
                            loader.style.display = 'none';
                            infoDiv.innerHTML = '❌ Ошибка HLS (возможно, ссылка устарела)';
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', () => {
                        loader.style.display = 'none';
                        infoDiv.innerHTML = `▶ HLS (native): ${url.substring(0, 60)}...`;
                        video.play().catch(e=>null);
                        initPlayer();
                    });
                } else {
                    loader.style.display = 'none';
                    infoDiv.innerHTML = '❌ Ваш браузер не поддерживает HLS';
                }
            } 
            // Обычное видео (MP4 и т.д.)
            else {
                video.src = url;
                video.load();
                video.addEventListener('canplay', () => {
                    loader.style.display = 'none';
                    infoDiv.innerHTML = `▶ Воспроизведение: ${url.substring(0, 60)}...`;
                    initPlayer();
                }, { once: true });
                video.onerror = () => {
                    loader.style.display = 'none';
                    infoDiv.innerHTML = '❌ Не удалось загрузить видео (неверный формат или ссылка)';
                };
            }

            // Обновление времени
            video.addEventListener('timeupdate', () => {
                if (video.duration && !isNaN(video.duration)) {
                    infoDiv.innerHTML = `${formatTime(video.currentTime)} / ${formatTime(video.duration)} • ${streamUrl.substring(0, 50)}...`;
                }
            });
        }

        // 4. ИНИЦИАЛИЗАЦИЯ MEDIAELEMENT.JS (ТВОЙ ЛЮБИМЫЙ ПЛЕЕР)
        function initPlayer() {
            if (player) return;
            try {
                player = new MediaElementPlayer('my-video', {
                    pluginPath: 'https://cdnjs.com/libraries/mediaelement-plugins/',
                    shimScriptAccess: 'always',
                    features: ['playpause', 'progress', 'current', 'duration', 'volume', 'fullscreen']
                });
            } catch(e) {
                console.warn("MediaElement init error", e);
            }
        }

        // 5. ОСНОВНАЯ ЛОГИКА: ЧИТАЕМ АДРЕСНУЮ СТРОКУ + 24-ЧАСОВОЕ ШИФРОВАНИЕ
        async function main() {
            let url = getStreamFromUrl();
            if (url) {
                // Если ссылка уже зашифрована (параметр enc), то расшифровывать не нужно – просто грузим.
                // ВАЖНО: декодирование enc происходит на сервере. В статике мы просто принимаем ссылку как есть.
                // Но чтобы реализовать 24‑часовую защиту как в репозитории, надо создавать шифрованную версию.
                // Поэтому:
                // 1. Если передан параметр enc — то ссылка уже зашифрована ранее (не трогаем).
                // 2. Если передан src — шифруем её тут же и заменяем URL в адресной строке (как в cdnplayerjs).
                const encParam = new URLSearchParams(window.location.search).get('enc');
                if (!encParam) {
                    // Шифруем ссылку для защиты (24 часа TTL)
                    const encrypted = await encryptUrl(url);
                    if (encrypted) {
                        const newUrl = new URL(window.location.href);
                        newUrl.searchParams.delete('src');
                        newUrl.searchParams.delete('file');
                        newUrl.searchParams.delete('stream');
                        newUrl.searchParams.delete('url');
                        newUrl.searchParams.set('enc', encrypted.enc);
                        newUrl.searchParams.set('k', encrypted.k);
                        window.history.replaceState({}, '', newUrl.toString());
                        infoDiv.innerHTML = '🔒 Ссылка зашифрована (срок жизни — 24 часа)';
                    }
                }
                loadMedia(url);
            } else {
                // Если ссылки нет — показываем сообщение и пример использования
                infoDiv.innerHTML = 'ℹ️ Укажите ссылку в адресной строке: ?src=https://example.com/video.m3u8';
                loader.style.display = 'none';
            }
        }

        // Водяной знак (по твоему коду)
        $(".video-area").hover(
            function() { $('.watermark').fadeIn(200); },
            function() { $('.watermark').fadeOut(200); }
        );

        main();
    })();
</script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
